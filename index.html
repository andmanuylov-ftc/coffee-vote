<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Выбор концепции упаковки — ПЧК</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#BA7517;--brand-bg:rgba(186,117,23,.08);
  --text:#1a1a1a;--t2:#666;--t3:#999;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.2);
  --bg:#fff;--bg2:#f7f5f2;--bg3:#f0ede8;
  --r:12px;--rs:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh}
.page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem}
header{padding:2rem 0 2.5rem;border-bottom:1px solid var(--border);margin-bottom:2.5rem}
.logo{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
h1{font-size:28px;font-weight:600;line-height:1.2;margin-bottom:6px}
.sub{font-size:15px;color:var(--t2)}
.warn{font-size:13px;background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--rs);padding:10px 14px;margin-bottom:1.5rem;color:#991b1b}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;margin-bottom:2rem}
.card{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--border2)}
.card.selected{border-color:var(--brand);border-width:2px}
.card-gallery{position:relative;width:100%;aspect-ratio:4/5;background:var(--bg3);overflow:hidden;user-select:none}
.gallery-img{width:100%;height:100%;object-fit:contain;display:block}
.gallery-canvas{width:100%;height:100%;object-fit:contain;display:block}
.no-files{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--t3)}
.no-files svg{width:36px;height:36px;opacity:.35}
.no-files span{font-size:12px}
.g-count{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.45);color:#fff;font-size:11px;padding:3px 8px;border-radius:20px;pointer-events:none}
.g-prev,.g-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);color:#fff;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center}
.g-prev{left:8px}.g-next{right:8px}
.g-prev:hover,.g-next:hover{background:rgba(0,0,0,.65)}
.g-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:5px}
.g-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.45);border:none;cursor:pointer;padding:0;transition:background .15s}
.g-dot.on{background:#fff}
.file-prev{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:1rem}
.f-badge{width:52px;height:64px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;letter-spacing:.05em}
.f-name{font-size:11px;color:var(--t2);text-align:center;word-break:break-all;line-height:1.4;max-width:160px}
.f-dl{font-size:12px;color:var(--brand);border:1px solid var(--brand);background:none;border-radius:5px;padding:5px 12px;cursor:pointer;text-decoration:none;display:inline-block}
.card-body{padding:14px 16px}
.c-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--brand);font-weight:500;margin-bottom:3px}
.c-name{font-size:16px;font-weight:600;margin-bottom:10px}
.radio-row{display:flex;align-items:center;gap:8px}
.radio-circle{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.card.selected .radio-circle{border-color:var(--brand);background:var(--brand)}
.r-dot{width:7px;height:7px;border-radius:50%;background:#fff;display:none}
.card.selected .r-dot{display:block}
.r-lbl{font-size:13px;color:var(--t2)}
.card.selected .r-lbl{color:var(--brand);font-weight:500}
.voter-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1.5rem}
label{font-size:13px;color:var(--t2);display:block;margin-bottom:5px}
.opt{font-size:11px;color:var(--t3);margin-left:4px}
input[type=text],textarea{width:100%;font-size:14px;color:var(--text);background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;font-family:inherit;outline:none;transition:border-color .15s}
input[type=text]:focus,textarea:focus{border-color:var(--brand)}
textarea{resize:vertical;min-height:60px}
.actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.btn-vote{background:var(--brand);color:#fff;border:none;border-radius:var(--rs);padding:11px 28px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-vote:disabled{opacity:.4;cursor:not-allowed}
.btn-vote:not(:disabled):hover{opacity:.88}
.btn-res{font-size:13px;color:var(--brand);background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:3px}
.err{font-size:13px;color:#c0392b}
.ok-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:var(--rs);padding:12px 16px;font-size:14px;color:#166534;margin-bottom:1.5rem;display:none}
.res-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-top:1.5rem;display:none}
.res-title{font-size:15px;font-weight:600;margin-bottom:1.25rem}
.res-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.res-name{font-size:13px;color:var(--text);width:160px;flex-shrink:0;line-height:1.4}
.res-bar-bg{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.res-bar{height:100%;background:var(--brand);border-radius:4px;transition:width .5s ease}
.res-meta{font-size:12px;color:var(--t2);width:60px;text-align:right;white-space:nowrap}
@media(max-width:600px){h1{font-size:22px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo">ПЧК</div>
    <h1>Выбор концепции упаковки</h1>
    <p class="sub">Ароматизированный кофе в зёрнах — проголосуйте за лучший дизайн</p>
  </header>
  <div id="app"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  КОНФИГУРАЦИЯ — отредактируйте этот блок
// ═══════════════════════════════════════════════

const SUPABASE_URL = 'YOUR_SUPABASE_URL';      // ← вставить URL проекта
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY'; // ← вставить anon key

const CONCEPTS = [
  {
    id: 1,
    label: 'Концепция 1',
    name: '«Эмоциональная»',
    files: [
      // Пути к файлам в папке designs/, например:
      // 'designs/concept1/slide1.jpg',
      // 'designs/concept1/slide2.jpg',
    ]
  },
  {
    id: 2,
    label: 'Концепция 2',
    name: '«Чувственная»',
    files: [
      // 'designs/concept2/slide1.jpg',
    ]
  },
  {
    id: 3,
    label: 'Концепция 3',
    name: '«Дружелюбие»',
    files: [
      // 'designs/concept3/slide1.jpg',
    ]
  }
];

// ═══════════════════════════════════════════════
//  КОНЕЦ КОНФИГУРАЦИИ
// ═══════════════════════════════════════════════

if(typeof pdfjsLib!=='undefined'){
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

let sb=null;
if(SUPABASE_URL!=='YOUR_SUPABASE_URL') sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let selId=null,voted=false,showRes=false,localVotes={};
const galleries={};
CONCEPTS.forEach(c=>{localVotes[c.id]=0;galleries[c.id]={idx:0,files:c.files||[]};});

function ext(p){return p.split('.').pop().toLowerCase();}
function isImg(e){return['jpg','jpeg','png','webp','gif','bmp','svg'].includes(e);}
function badge(e){const m={pdf:'#E24B4A',pptx:'#D85A30',ppt:'#D85A30',docx:'#185FA5',doc:'#185FA5'};return{color:m[e]||'#888',label:e.toUpperCase().slice(0,4)};}

function renderGallery(id){
  const g=galleries[id];
  const el=document.getElementById('gal-'+id);
  if(!el)return;
  if(!g.files.length){
    el.innerHTML='<div class="no-files"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>Файлы не загружены</span></div>';
    return;
  }
  const f=g.files[g.idx];const e=ext(f);const tot=g.files.length;
  const cnt=tot>1?'<span class="g-count">'+(g.idx+1)+' / '+tot+'</span>':'';
  const dots=tot>1?'<div class="g-dots">'+g.files.map((_,i)=>'<button class="g-dot'+(i===g.idx?' on':'')+'" onclick="gGo(event,'+id+','+i+')"></button>').join('')+'</div>':'';
  const prev=tot>1&&g.idx>0?'<button class="g-prev" onclick="gPrev(event,'+id+')">&#8249;</button>':'';
  const next=tot>1&&g.idx<tot-1?'<button class="g-next" onclick="gNext(event,'+id+')">&#8250;</button>':'';
  if(isImg(e)){
    el.innerHTML='<img class="gallery-img" src="'+f+'" alt=""/>'+cnt+prev+next+dots;
  }else if(e==='pdf'){
    el.innerHTML='<canvas id="pdfcv-'+id+'-'+g.idx+'" class="gallery-canvas"></canvas>'+cnt+prev+next+dots;
    renderPdf(f,'pdfcv-'+id+'-'+g.idx,el);
  }else{
    const b=badge(e);const fn=f.split('/').pop();
    el.innerHTML='<div class="file-prev"><div class="f-badge" style="background:'+b.color+'">'+b.label+'</div><div class="f-name">'+fn+'</div><a class="f-dl" href="'+f+'" download onclick="event.stopPropagation()">Скачать</a></div>'+cnt+prev+next+dots;
  }
}

function renderPdf(url,cvId,parent){
  if(typeof pdfjsLib==='undefined')return;
  pdfjsLib.getDocument(url).promise.then(pdf=>pdf.getPage(1).then(page=>{
    const cv=document.getElementById(cvId);if(!cv)return;
    const vp=page.getViewport({scale:1});
    const sc=(parent.clientWidth||240)/vp.width;
    const v=page.getViewport({scale:sc});
    cv.width=v.width;cv.height=v.height;
    page.render({canvasContext:cv.getContext('2d'),viewport:v});
  })).catch(()=>{});
}

function gPrev(e,id){e.stopPropagation();if(galleries[id].idx>0){galleries[id].idx--;renderGallery(id);}}
function gNext(e,id){e.stopPropagation();const g=galleries[id];if(g.idx<g.files.length-1){g.idx++;renderGallery(id);}}
function gGo(e,id,i){e.stopPropagation();galleries[id].idx=i;renderGallery(id);}

function selectConcept(id){
  if(voted)return;
  selId=id;
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('card-'+id).classList.add('selected');
  document.querySelectorAll('.r-lbl').forEach(l=>l.textContent='Выбрать');
  document.getElementById('rl-'+id).textContent='Выбрано ✓';
  document.getElementById('btn-vote').disabled=false;
  document.getElementById('err').textContent='';
}

async function submitVote(){
  if(!selId){document.getElementById('err').textContent='Выберите концепцию';return;}
  const name=document.getElementById('vname').value.trim();
  const comment=document.getElementById('vcomment').value.trim();
  if(sb){
    const{error}=await sb.from('votes').insert([{concept_id:selId,voter_name:name||null,comment:comment||null}]);
    if(error){document.getElementById('err').textContent='Ошибка. Попробуйте ещё раз.';console.error(error);return;}
  }else{localVotes[selId]++;}
  voted=true;
  document.getElementById('btn-vote').disabled=true;
  document.getElementById('btn-vote').textContent='Голос учтён ✓';
  document.querySelectorAll('.card').forEach(c=>c.style.cursor='default');
  const ok=document.getElementById('ok-box');
  ok.textContent=(name?name+', с':'С')+'пасибо! Ваш голос учтён.';
  ok.style.display='block';
  if(showRes)loadResults();
}

async function loadResults(){
  const box=document.getElementById('res-box');box.style.display='block';
  let counts={};CONCEPTS.forEach(c=>counts[c.id]=0);
  if(sb){
    const{data,error}=await sb.from('votes').select('concept_id');
    if(!error&&data)data.forEach(r=>{if(counts[r.concept_id]!==undefined)counts[r.concept_id]++;});
  }else{counts={...localVotes};}
  const total=Object.values(counts).reduce((a,b)=>a+b,0);
  document.getElementById('res-title').textContent='Результаты · '+total+' голос'+(total===1?'':total<5?'а':'ов');
  document.getElementById('res-bars').innerHTML=CONCEPTS.map(c=>{
    const n=counts[c.id]||0;const pct=total>0?Math.round(n/total*100):0;
    return'<div class="res-row"><div class="res-name">'+c.label+'<br><span style="color:#bbb;font-size:11px">'+c.name+'</span></div><div class="res-bar-bg"><div class="res-bar" style="width:'+pct+'%"></div></div><div class="res-meta">'+n+' <span style="color:#ccc">('+pct+'%)</span></div></div>';
  }).join('');
}

function toggleResults(){
  showRes=!showRes;
  document.getElementById('btn-res').textContent=showRes?'Скрыть результаты':'Показать результаты';
  if(showRes)loadResults();else document.getElementById('res-box').style.display='none';
}

function render(){
  const app=document.getElementById('app');
  app.innerHTML=
    (!sb?'<div class="warn">⚠ Supabase не настроен — голоса сохраняются только локально. Добавьте ключи в <code>index.html</code>.</div>':'')+
    '<div class="grid">'+CONCEPTS.map(c=>'<div class="card" id="card-'+c.id+'" onclick="selectConcept('+c.id+')"><div class="card-gallery" id="gal-'+c.id+'"></div><div class="card-body"><div class="c-label">'+c.label+'</div><div class="c-name">'+c.name+'</div><div class="radio-row"><div class="radio-circle"><div class="r-dot"></div></div><span class="r-lbl" id="rl-'+c.id+'">Выбрать</span></div></div></div>').join('')+'</div>'+
    '<div class="ok-box" id="ok-box"></div>'+
    '<div class="voter-box"><div style="margin-bottom:14px"><label>Ваше имя <span class="opt">необязательно</span></label><input type="text" id="vname" placeholder="Иван Иванов" style="max-width:300px"/></div><div><label>Комментарий <span class="opt">необязательно</span></label><textarea id="vcomment" placeholder="Что вас привлекает в этом варианте?"></textarea></div></div>'+
    '<div class="actions"><button class="btn-vote" id="btn-vote" onclick="submitVote()" disabled>Проголосовать</button><span class="err" id="err"></span><button class="btn-res" id="btn-res" onclick="toggleResults()">Показать результаты</button></div>'+
    '<div class="res-box" id="res-box"><div class="res-title" id="res-title">Результаты</div><div id="res-bars"></div></div>';
  CONCEPTS.forEach(c=>renderGallery(c.id));
}

render();
</script>
</body>
</html>
